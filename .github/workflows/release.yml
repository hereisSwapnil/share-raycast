name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Raycast extension
        run: npm run build:release

      - name: Package release asset
        run: |
          cd dist
          zip -r "../share-raycast-${{ github.ref_name }}.zip" .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Share Raycast ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: share-raycast-${{ github.ref_name }}.zip
